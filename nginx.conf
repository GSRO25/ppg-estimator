server {
    listen 443 ssl;
    server_name ppg-estimator.primeplumbinggroup.com.au localhost;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Bumped for plumbing DWG uploads — a typical sheet with embedded xrefs
    # runs 30–80 MB; batch uploads of 3–5 drawings hit a few hundred MB.
    client_max_body_size 500M;
    client_body_timeout 300s;

    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /extract/ {
        proxy_pass http://extraction:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300;
    }
}

server {
    listen 80;
    return 301 https://$host$request_uri;
}
