services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ppg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-ppg_estimator}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ppg}"]
      interval: 5s
      timeout: 3s
      retries: 5

  extraction:
    build: ./backend
    image: ppg-estimator-extraction:stable
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - UPLOAD_DIR=/data/uploads
      - EXPORT_DIR=/data/exports
    volumes:
      - uploads:/data/uploads
      - exports:/data/exports
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - EXTRACTION_API_URL=http://extraction:8000
      - UPLOAD_DIR=/data/uploads
      - EXPORT_DIR=/data/exports
      - AUTH_TRUST_HOST=true
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      - uploads:/data/uploads
      - exports:/data/exports
    depends_on:
      db:
        condition: service_healthy
      extraction:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - extraction

volumes:
  pgdata:
  uploads:
  exports:
